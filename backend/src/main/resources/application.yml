spring:
  application:
    name: inventory-api

  # ── datasource ──────────────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:inventory_db}
    username: ${DB_USER:inventory_user}
    password: ${DB_PASSWORD:changeme_db_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: InventoryHikariPool
      maximum-pool-size: ${DB_POOL_MAX:10}
      minimum-idle: ${DB_POOL_MIN:2}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      keepalive-time: 60000
      validation-timeout: 5000
      leak-detection-threshold: 60000

  # ── JPA ─────────────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        default_schema: public
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
        envers:
          audit_table_suffix: _aud
          revision_field_name: rev
          revision_type_field_name: revtype
          store_data_at_delete: true

  # ── Flyway ──────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    out-of-order: false

  # ── Redis ────────────────────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1

  # ── OAuth2 Resource Server (Keycloak) ───────────────────────────────────
  # issuer-uri   → validates the "iss" claim in incoming tokens (external URL)
  # jwk-set-uri  → where to fetch signing keys (internal Docker URL in containers)
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KC_ISSUER_URI:http://localhost:8180/realms/inventory}
          jwk-set-uri: ${KC_JWK_SET_URI:http://localhost:8180/realms/inventory/protocol/openid-connect/certs}

# ── Server ──────────────────────────────────────────────────────────────────
server:
  port: ${BACKEND_PORT:8080}
  error:
    include-message: never
    include-stacktrace: never
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html
    min-response-size: 1024

# ── Actuator / Observability ─────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,loggers
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
    loggers:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
      profile: ${spring.profiles.active:default}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 50ms,100ms,200ms,500ms,1s,2s
  tracing:
    sampling:
      probability: 1.0
  # Destino de los spans. Alloy los recibe por OTLP/HTTP y los reenvía a Tempo.
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://alloy:4318/v1/traces}
  info:
    env:
      enabled: true

# ── Info endpoint ──────────────────────────────────────────────────────────────
info:
  app:
    name: ${spring.application.name}
    version: "@project.version@"
    description: Sistema de Gestión de Inventarios Empresarial

# ── CORS ────────────────────────────────────────────────────────────────────────
# Override allowed-origins per profile (dev/demo/staging/prod)
app:
  cors:
    allowed-origins: http://localhost:3000

# ── SpringDoc / Swagger UI ───────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    oauth:
      client-id: ${KC_CLIENT_ID:inventory-frontend}
      use-pkce-with-authorization-code-grant: true
    try-it-out-enabled: true
    operations-sorter: alpha
    tags-sorter: alpha
    default-models-expand-depth: 1
  default-produces-media-type: application/json
  show-actuator: false

# ── Logging (base) ─────────────────────────────────────────────────────────────
logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.inventory: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.flywaydb: INFO
