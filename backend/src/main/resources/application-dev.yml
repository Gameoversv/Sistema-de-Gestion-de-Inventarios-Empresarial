# Profile: dev
# Local development — verbose logging, lenient flyway, SQL visible
spring:
  flyway:
    baseline-on-migrate: true

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      timeout: 500ms

server:
  error:
    include-message: always
    include-stacktrace: on_param

management:
  endpoint:
    health:
      show-details: always

app:
  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173,http://localhost:4200

logging:
  level:
    com.inventory: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.flywaydb: DEBUG
