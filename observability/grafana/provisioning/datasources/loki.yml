apiVersion: 1

datasources:
  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      maxLines: 1000
      # Derived fields: extraen el traceId del JSON de la línea y lo convierten
      # en un enlace directo a la traza en Tempo. Es la mitad logs→trazas de la
      # correlación; la mitad inversa vive en tempo.yml (tracesToLogsV2).
      derivedFields:
        - name: traceId
          matcherType: regex
          matcherRegex: '"traceId"\s*:\s*"([a-f0-9]+)"'
          url: '$${__value.raw}'
          datasourceUid: tempo
          urlDisplayLabel: 'Ver traza en Tempo'
