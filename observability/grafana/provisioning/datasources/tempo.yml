apiVersion: 1

datasources:
  - name: Tempo
    uid: tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    editable: false
    jsonData:
      # Grafo de servicios y métricas RED derivadas de los spans, que Tempo
      # escribe en Prometheus por remote-write.
      serviceMap:
        datasourceUid: prometheus
      tracesToMetrics:
        datasourceUid: prometheus
        tags:
          - key: service.name
            value: service
      nodeGraph:
        enabled: true
      # Correlación trazas→logs: desde un span, salta a las líneas de Loki del
      # mismo servicio que llevan ese traceId. La dirección inversa está en
      # loki.yml (derivedFields).
      # La etiqueta de Loki es el servicio de Compose ("backend") y el
      # service.name del span es "inventory-api": no coinciden, así que se usa
      # una consulta explícita en lugar del mapeo automático por tags.
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: '-5m'
        spanEndTimeShift: '5m'
        customQuery: true
        query: '{service="backend"} |= "$${__span.traceId}"'
