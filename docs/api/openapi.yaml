openapi: 3.0.1
info:
  title: Inventory Management API
  description: "Sistema de Gestión de Inventarios Empresarial — PUCMM. API REST para\
    \ gestión de productos, stock, reportes y auditoría."
  contact:
    name: PUCMM Inventory Team
    email: wgvr0001@ce.pucmm.edu.do
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  version: 1.0.0
servers:
- url: http://localhost:8080
  description: Generated server url
security:
- keycloak: []
tags:
- name: Stock
  description: Control de inventario — movimientos y alertas
- name: Reports
  description: Reportes del dashboard — resumen de stock y alertas
- name: Audit
  description: Historial de revisiones Envers — requiere audit:view
- name: Categories
  description: Gestión de categorías de productos
- name: Products
  description: Gestión de productos del inventario
paths:
  /products/{id}:
    get:
      tags:
      - Products
      summary: Obtener producto por ID
      operationId: getById
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: Producto encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "401":
          description: Token ausente o inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "403":
          description: Scope insuficiente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "404":
          description: Producto no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
      security:
      - keycloak: []
    put:
      tags:
      - Products
      summary: Reemplazar producto completo (todos los campos requeridos)
      operationId: update
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdateRequest"
        required: true
      responses:
        "200":
          description: Producto actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "401":
          description: Token ausente o inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "403":
          description: Scope insuficiente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "404":
          description: Producto no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "400":
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
      security:
      - keycloak: []
    delete:
      tags:
      - Products
      summary: Desactivar producto (soft delete — activo=false)
      operationId: delete
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "401":
          description: Token ausente o inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "204":
          description: Producto desactivado
        "403":
          description: Scope insuficiente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "404":
          description: Producto no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
      security:
      - keycloak: []
    patch:
      tags:
      - Products
      summary: Actualización parcial de producto (solo campos enviados)
      operationId: patch
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductPatchRequest"
        required: true
      responses:
        "200":
          description: Producto actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "401":
          description: Token ausente o inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "403":
          description: Scope insuficiente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "404":
          description: Producto no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "400":
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
      security:
      - keycloak: []
  /categories/{id}:
    get:
      tags:
      - Categories
      summary: Obtener categoría por ID
      operationId: getById_1
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "401":
          description: Token ausente o inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "200":
          description: Categoría encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryResponse"
        "403":
          description: Scope insuficiente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "404":
          description: Categoría no encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
      security:
      - keycloak: []
    put:
      tags:
      - Categories
      summary: Actualizar categoría
      operationId: update_1
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryUpdateRequest"
        required: true
      responses:
        "401":
          description: Token ausente o inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "403":
          description: Scope insuficiente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "200":
          description: Categoría actualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryResponse"
        "404":
          description: Categoría no encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "400":
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
      security:
      - keycloak: []
    delete:
      tags:
      - Categories
      summary: Eliminar categoría
      operationId: delete_1
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "204":
          description: Categoría eliminada
        "401":
          description: Token ausente o inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "403":
          description: Scope insuficiente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "404":
          description: Categoría no encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
      security:
      - keycloak: []
  /products:
    get:
      tags:
      - Products
      summary: "Listar productos con paginación, búsqueda y filtros"
      operationId: list
      parameters:
      - name: search
        in: query
        description: Búsqueda por nombre o SKU
        required: false
        schema:
          type: string
      - name: categoryId
        in: query
        description: Filtrar por ID de categoría
        required: false
        schema:
          type: integer
          format: int64
      - name: active
        in: query
        description: Filtrar por estado activo/inactivo
        required: false
        schema:
          type: boolean
      - name: pageable
        in: query
        required: true
        schema:
          $ref: "#/components/schemas/Pageable"
      responses:
        "401":
          description: Token ausente o inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "200":
          description: Lista de productos paginada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageProductResponse"
        "403":
          description: Scope insuficiente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
      security:
      - keycloak: []
    post:
      tags:
      - Products
      summary: Crear nuevo producto
      operationId: create
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductCreateRequest"
        required: true
      responses:
        "201":
          description: Producto creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
              examples:
                laptop:
                  summary: Ejemplo — laptop
                  description: laptop
                  value:
                    id: 1
                    sku: LAPTOP-001
                    name: Laptop Dell XPS 15
                    price: 1299.99
                    stock: 10
                    minimumStock: 2
                    active: true
                    categoryId: 1
                    categoryName: Electrónica
        "401":
          description: Token ausente o inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "403":
          description: Scope insuficiente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "409":
          description: SKU ya existe
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "400":
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
      security:
      - keycloak: []
  /categories:
    get:
      tags:
      - Categories
      summary: Listar todas las categorías
      operationId: list_1
      responses:
        "401":
          description: Token ausente o inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "200":
          description: Lista de categorías
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryResponse"
        "403":
          description: Scope insuficiente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
      security:
      - keycloak: []
    post:
      tags:
      - Categories
      summary: Crear nueva categoría
      operationId: create_1
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryCreateRequest"
        required: true
      responses:
        "401":
          description: Token ausente o inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "403":
          description: Scope insuficiente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "400":
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "201":
          description: Categoría creada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryResponse"
      security:
      - keycloak: []
  /api/stock/movements:
    get:
      tags:
      - Stock
      summary: Listar movimientos con filtros opcionales
      operationId: list_2
      parameters:
      - name: productId
        in: query
        description: Filtrar por ID de producto
        required: false
        schema:
          type: integer
          format: int64
      - name: type
        in: query
        description: "Filtrar por tipo: IN, OUT, ADJUSTMENT"
        required: false
        schema:
          type: string
          enum:
          - IN
          - OUT
          - ADJUSTMENT
      - name: from
        in: query
        description: Fecha inicio (ISO-8601)
        required: false
        schema:
          type: string
          format: date-time
      - name: to
        in: query
        description: Fecha fin (ISO-8601)
        required: false
        schema:
          type: string
          format: date-time
      - name: pageable
        in: query
        required: true
        schema:
          $ref: "#/components/schemas/Pageable"
      responses:
        "401":
          description: Token ausente o inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "403":
          description: Scope insuficiente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "200":
          description: Lista paginada de movimientos de stock
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageStockMovementResponse"
      security:
      - keycloak: []
    post:
      tags:
      - Stock
      summary: Registrar movimiento de inventario (IN / OUT / ADJUSTMENT)
      operationId: register
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StockMovementRequest"
        required: true
      responses:
        "401":
          description: Token ausente o inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "403":
          description: Scope insuficiente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "404":
          description: Producto no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "201":
          description: Movimiento registrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockMovementResponse"
              examples:
                entrada:
                  summary: Entrada de 50 unidades
                  description: entrada
                  value:
                    id: 100
                    productId: 1
                    sku: LAPTOP-001
                    productName: Laptop Dell XPS 15
                    type: IN
                    quantity: 50
                    quantityBefore: 10
                    quantityAfter: 60
                    reason: Reposición mensual
                    referenceId: PO-2024-001
                    performedBy: admin
        "400":
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
      security:
      - keycloak: []
  /ping:
    get:
      tags:
      - ping-controller
      operationId: ping
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: object
  /me:
    get:
      tags:
      - me-controller
      operationId: me
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: object
  /health:
    get:
      tags:
      - health-controller
      operationId: health
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: object
  /api/stock/alerts:
    get:
      tags:
      - Stock
      summary: Productos bajo stock mínimo
      operationId: alerts
      responses:
        "401":
          description: Token ausente o inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "403":
          description: Scope insuficiente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "200":
          description: Lista de productos con stock insuficiente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductResponse"
      security:
      - keycloak: []
  /api/reports/top-products:
    get:
      tags:
      - Reports
      summary: Top productos por valor de inventario o cantidad de stock
      description: Devuelve los N productos activos con mayor inventario. metric=value
        ordena por precio×stock; metric=quantity por unidades en stock.
      operationId: topProducts
      parameters:
      - name: limit
        in: query
        description: Número máximo de productos a devolver
        required: false
        schema:
          type: integer
          format: int32
          default: 10
        example: 10
      - name: metric
        in: query
        description: "Métrica de ordenamiento: value (precio×stock) | quantity (unidades)"
        required: false
        schema:
          type: string
          default: value
        example: value
      responses:
        "401":
          description: Token ausente o inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "403":
          description: Scope report:view requerido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "200":
          description: Ranking calculado correctamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TopProductsResponse"
      security:
      - keycloak: []
  /api/reports/stock-summary:
    get:
      tags:
      - Reports
      summary: Resumen de inventario agrupado por categoría
      operationId: stockSummary
      responses:
        "200":
          description: Resumen de stock generado correctamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockSummaryResponse"
        "401":
          description: Token ausente o inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "403":
          description: Scope report:view requerido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
      security:
      - keycloak: []
  /api/reports/recent-movements:
    get:
      tags:
      - Reports
      summary: Movimientos de stock más recientes
      description: Devuelve los N movimientos de stock más recientes en orden cronológico
        inverso.
      operationId: recentMovements
      parameters:
      - name: limit
        in: query
        description: Número de movimientos a devolver (máximo 100)
        required: false
        schema:
          type: integer
          format: int32
          default: 20
        example: 20
      responses:
        "200":
          description: Movimientos recientes devueltos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecentMovementsResponse"
        "401":
          description: Token ausente o inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "403":
          description: Scope report:view requerido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
      security:
      - keycloak: []
  /api/reports/low-stock:
    get:
      tags:
      - Reports
      summary: Reporte de productos bajo stock mínimo
      description: Devuelve productos cuyo stock ≤ umbral. Si threshold=0 usa el minimumStock
        configurado por producto.
      operationId: lowStock
      parameters:
      - name: threshold
        in: query
        description: Umbral de stock (0 = usar minimumStock por producto)
        required: false
        schema:
          type: integer
          format: int32
          default: 0
        example: 5
      responses:
        "401":
          description: Token ausente o inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "403":
          description: Scope report:view requerido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "200":
          description: Reporte generado correctamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LowStockReportResponse"
      security:
      - keycloak: []
  /api/reports/dashboard-metrics:
    get:
      tags:
      - Reports
      summary: Métricas generales del inventario
      description: "Agrega en una sola respuesta los contadores clave del inventario:\
        \ productos, categorías, movimientos, valor total, alertas de stock y último\
        \ movimiento."
      operationId: dashboardMetrics
      responses:
        "401":
          description: Token ausente o inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "403":
          description: Scope report:view requerido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "200":
          description: Métricas calculadas correctamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardMetricsResponse"
      security:
      - keycloak: []
  /api/reports/critical-stock:
    get:
      tags:
      - Reports
      summary: Productos activos con stock en cero
      description: Devuelve todos los productos activos cuyo stock actual es exactamente
        0.
      operationId: criticalStock
      responses:
        "401":
          description: Token ausente o inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "403":
          description: Scope report:view requerido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "200":
          description: Listado de productos sin stock
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CriticalStockResponse"
      security:
      - keycloak: []
  /api/audit/stock-movements:
    get:
      tags:
      - Audit
      summary: Historial de revisiones de movimientos de stock (Envers)
      description: "Filtros opcionales: productId, username, from, to."
      operationId: movementHistory
      parameters:
      - name: productId
        in: query
        description: Filtrar por ID de producto
        required: false
        schema:
          type: integer
          format: int64
      - name: username
        in: query
        description: Filtrar por nombre de usuario
        required: false
        schema:
          type: string
      - name: from
        in: query
        description: Fecha inicio (ISO-8601)
        required: false
        schema:
          type: string
          format: date-time
      - name: to
        in: query
        description: Fecha fin (ISO-8601)
        required: false
        schema:
          type: string
          format: date-time
      responses:
        "401":
          description: Token ausente o inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "403":
          description: Scope audit:view requerido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "200":
          description: Lista de revisiones de auditoría
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditRevisionResponse"
      security:
      - keycloak: []
  /api/audit/products:
    get:
      tags:
      - Audit
      summary: Historial de revisiones de productos (Envers)
      description: "Devuelve todos los cambios auditados sobre productos. Filtro opcional:\
        \ username."
      operationId: productHistory
      parameters:
      - name: username
        in: query
        description: Filtrar por nombre de usuario
        required: false
        schema:
          type: string
      responses:
        "401":
          description: Token ausente o inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "403":
          description: Scope audit:view requerido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "200":
          description: Lista de revisiones de productos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductAuditResponse"
      security:
      - keycloak: []
  /api/audit/all:
    get:
      tags:
      - Audit
      summary: Historial unificado de auditoría (Envers)
      description: "Devuelve todos los cambios de todas las entidades auditadas: productos,\
        \ categorías, movimientos de stock y usuarios, ordenados por revisión descendente."
      operationId: unifiedHistory
      responses:
        "200":
          description: Lista unificada de eventos de auditoría
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnifiedAuditEntry"
        "401":
          description: Token ausente o inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "403":
          description: Scope audit:view requerido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
      security:
      - keycloak: []
