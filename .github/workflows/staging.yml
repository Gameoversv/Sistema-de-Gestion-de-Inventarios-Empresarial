name: Staging — Deploy & Test

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  deploy-and-test:
    name: Deploy full stack → run post-deploy tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # ── Generate .env from secrets ─────────────────────────────────────────
      - name: Create .env
        run: |
          cat > .env << 'ENVEOF'
          DB_HOST=postgres
          DB_PORT=5432
          DB_NAME=inventory_db
          DB_USER=inventory_user
          DB_PASSWORD=${{ secrets.STAGING_DB_PASSWORD }}
          BACKEND_PORT=8080
          SPRING_PROFILES_ACTIVE=staging
          LOG_LEVEL=INFO
          KEYCLOAK_PORT=8180
          KEYCLOAK_ADMIN=admin
          KEYCLOAK_ADMIN_PASSWORD=${{ secrets.STAGING_KEYCLOAK_ADMIN_PASSWORD }}
          KC_DB_NAME=keycloak_db
          KC_DB_USER=keycloak_user
          KC_DB_PASSWORD=${{ secrets.STAGING_KC_DB_PASSWORD }}
          KC_REALM=inventory
          KC_USER_ADMIN_USERNAME=inv_admin
          KC_USER_ADMIN_PASSWORD=${{ secrets.STAGING_KC_USER_ADMIN_PASSWORD }}
          KC_USER_CLERK_USERNAME=inv_clerk
          KC_USER_CLERK_PASSWORD=${{ secrets.STAGING_KC_USER_CLERK_PASSWORD }}
          KC_USER_AUDITOR_USERNAME=inv_auditor
          KC_USER_AUDITOR_PASSWORD=${{ secrets.STAGING_KC_USER_AUDITOR_PASSWORD }}
          KC_USER_VIEWER_USERNAME=inv_viewer
          KC_USER_VIEWER_PASSWORD=${{ secrets.STAGING_KC_USER_VIEWER_PASSWORD }}
          GRAFANA_ADMIN_PASSWORD=${{ secrets.STAGING_GRAFANA_ADMIN_PASSWORD }}
          GRAFANA_PORT=3001
          PROMETHEUS_PORT=9090
          FRONTEND_PORT=3000
          VITE_API_BASE_URL=http://localhost:8080
          APP_ENV=staging
          ENVEOF

      # ── Deploy ────────────────────────────────────────────────────────────
      - name: Deploy stack (docker compose up)
        run: docker compose up -d --build

      # ── Wait for services ─────────────────────────────────────────────────
      - name: Wait — Keycloak healthy
        run: |
          echo "Waiting for Keycloak..."
          for i in $(seq 1 24); do
            if curl -sf http://localhost:8180/health/ready > /dev/null 2>&1; then
              echo "Keycloak ready after $((i * 10))s"
              break
            fi
            [ "$i" = "24" ] && echo "ERROR: Keycloak timeout" && exit 1
            echo "  attempt $i/24, retrying in 10s..."
            sleep 10
          done

      - name: Wait — Backend healthy
        run: |
          echo "Waiting for backend..."
          for i in $(seq 1 18); do
            if curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1; then
              echo "Backend ready after $((i * 10))s"
              break
            fi
            [ "$i" = "18" ] && echo "ERROR: Backend timeout" && exit 1
            echo "  attempt $i/18, retrying in 10s..."
            sleep 10
          done

      # ── API tests (against running system) ───────────────────────────────
      - name: API smoke & integration tests
        run: |
          set -e
          BASE=http://localhost:8080
          KC=http://localhost:8180

          # ── Get JWT from live Keycloak ──────────────────────────────────
          echo "==> Obtaining JWT token from live Keycloak..."
          # Se guarda la respuesta entera, no solo el access_token: el refresh_token que viene en
          # la misma concesion es lo que prueba el bloque de S-2 mas abajo.
          TOKEN_RESPONSE=$(curl -sf \
            "$KC/realms/inventory/protocol/openid-connect/token" \
            -d "client_id=inventory-frontend" \
            -d "username=inv_admin" \
            -d "password=${{ secrets.STAGING_KC_USER_ADMIN_PASSWORD }}" \
            -d "grant_type=password" \
            -d "scope=openid product:view product:manage stock:view stock:manage report:view audit:view user:manage")

          TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.access_token')
          REFRESH_TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.refresh_token')

          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "ERROR: failed to obtain JWT from Keycloak"
            exit 1
          fi
          echo "✓ JWT token obtained"

          check() {
            local label="$1" expected="$2" url="$3"
            local status
            status=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer $TOKEN" "$url")
            if [ "$status" = "$expected" ]; then
              echo "✓ $label → $status"
            else
              echo "✗ $label expected $expected, got $status"
              exit 1
            fi
          }

          # ── Health ─────────────────────────────────────────────────────
          curl -sf "$BASE/actuator/health" | jq .
          echo "✓ Health endpoint OK"

          # ── Authenticated endpoints ─────────────────────────────────────
          check "GET /categories"              200 "$BASE/categories"
          check "GET /products"               200 "$BASE/products"
          check "GET /api/stock/movements"         200 "$BASE/api/stock/movements"
          check "GET /api/reports/dashboard-metrics" 200 "$BASE/api/reports/dashboard-metrics"
          check "GET /api/audit/stock-movements"   200 "$BASE/api/audit/stock-movements"

          # ── Security: must reject unauthenticated requests ──────────────
          UNAUTH=$(curl -s -o /dev/null -w "%{http_code}" "$BASE/products")
          if [ "$UNAUTH" = "401" ]; then
            echo "✓ Unauthenticated request correctly rejected (401)"
          else
            echo "✗ Expected 401 for unauthenticated request, got $UNAUTH"
            exit 1
          fi

          # ── Role boundary: viewer cannot create products ────────────────
          # Viewer must not be able to successfully create a product (must not get 201)
          VIEWER_TOKEN=$(curl -s \
            "$KC/realms/inventory/protocol/openid-connect/token" \
            -d "client_id=inventory-frontend" \
            -d "username=inv_viewer" \
            -d "password=${{ secrets.STAGING_KC_USER_VIEWER_PASSWORD }}" \
            -d "grant_type=password" \
            -d "scope=openid product:view stock:view" \
            | jq -r '.access_token // empty')

          VIEWER_CREATE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST -H "Authorization: Bearer $VIEWER_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"name":"test","sku":"SKU-RBAC-TEST","price":1.00,"stock":1,"minimumStock":0,"categoryId":1}' \
            "$BASE/products")
          if [ "$VIEWER_CREATE" != "201" ] && [ "$VIEWER_CREATE" != "200" ]; then
            echo "✓ Viewer role blocked from POST /products ($VIEWER_CREATE)"
          else
            echo "✗ Viewer should not be able to create products, got $VIEWER_CREATE"
            exit 1
          fi

          # ── S-2: refresh tokens ────────────────────────────────────────
          # El enunciado exige refresh tokens de forma explicita y no habia ninguna prueba: el
          # flujo de password grant se ejercitaba en cada despliegue, pero la renovacion nunca.
          echo ""
          echo "==> Verificando el flujo de refresh token..."

          if [ -z "$REFRESH_TOKEN" ] || [ "$REFRESH_TOKEN" = "null" ]; then
            echo "✗ La concesion por password no devolvio refresh_token"
            exit 1
          fi
          echo "✓ La concesion por password incluye refresh_token"

          REFRESH_RESPONSE=$(curl -s \
            "$KC/realms/inventory/protocol/openid-connect/token" \
            -d "client_id=inventory-frontend" \
            -d "grant_type=refresh_token" \
            -d "refresh_token=$REFRESH_TOKEN")

          REFRESHED_TOKEN=$(echo "$REFRESH_RESPONSE" | jq -r '.access_token // empty')
          if [ -z "$REFRESHED_TOKEN" ]; then
            echo "✗ grant_type=refresh_token no devolvio access_token"
            echo "$REFRESH_RESPONSE" | jq -r '.error_description // .error // .'
            exit 1
          fi
          echo "✓ grant_type=refresh_token emite un access_token nuevo"

          # Un token identico significaria que Keycloak devolvio el mismo de antes y que la
          # renovacion no sirve para prolongar la sesion.
          if [ "$REFRESHED_TOKEN" = "$TOKEN" ]; then
            echo "✗ El token renovado es identico al original"
            exit 1
          fi
          echo "✓ El token renovado es distinto del original"

          # Lo que importa no es que Keycloak emita algo, sino que el backend lo acepte: el token
          # renovado debe conservar los scopes de la concesion inicial.
          REFRESHED_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $REFRESHED_TOKEN" "$BASE/api/audit/stock-movements")
          if [ "$REFRESHED_STATUS" != "200" ]; then
            echo "✗ El backend rechazo el token renovado en un endpoint con scope: $REFRESHED_STATUS"
            exit 1
          fi
          echo "✓ El backend acepta el token renovado y conserva sus scopes"

          # Sin esta comprobacion, un endpoint que devolviera un token a cualquiera pasaria las
          # anteriores. Un refresh token invalido tiene que ser rechazado.
          BAD_REFRESH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "$KC/realms/inventory/protocol/openid-connect/token" \
            -d "client_id=inventory-frontend" \
            -d "grant_type=refresh_token" \
            -d "refresh_token=no-es-un-token")
          if [ "$BAD_REFRESH_STATUS" != "400" ]; then
            echo "✗ Un refresh token invalido deberia dar 400, dio $BAD_REFRESH_STATUS"
            exit 1
          fi
          echo "✓ Un refresh token invalido se rechaza con 400"

          echo ""
          echo "✅ All API integration tests passed"

      # ── Integration tests (Spring context vs live Postgres) ──────────────
      #
      # Este paso invocaba StockServiceConcurrencyIT pasandole la URL de abajo y el
      # secreto de la contrasena, pero esa clase declara @Container PostgreSQLContainer
      # y @DynamicPropertySource. Las propiedades dinamicas tienen la precedencia mas
      # alta de Spring, por encima de los -D, asi que el test levantaba su propio
      # Postgres efimero y nunca tocaba la base desplegada: en el run 29973867778 se
      # lee "Container postgres:16-alpine started". El nombre del paso y el secreto
      # que consumia eran falsos.
      #
      # Ahora corre LiveDatabaseIT, que no usa Testcontainers y toma la configuracion
      # del entorno. El perfil live-db-it deja fuera al resto de IT —que si levantan
      # su propio contenedor— y falla si el filtro no casa con ninguna clase.
      - name: Run IT tests against live DB
        working-directory: backend
        env:
          LIVE_DB_IT: 'true'
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/inventory_db
          SPRING_DATASOURCE_USERNAME: inventory_user
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
        run: ./mvnw verify -B -P live-db-it

      # ── Security scan ─────────────────────────────────────────────────────
      # El escaneo anterior era `action-baseline` contra http://localhost:8080 sin
      # autenticar y con `-I`, que le impide fallar. Como todo endpoint de negocio
      # exige JWT, ZAP solo veia 401 y araneaba la raiz: un escaneo que no podia
      # encontrar nada ni suspender.
      #
      # Ahora:
      #   · zap-api-scan con el OpenAPI como semilla, para que recorra los endpoints
      #     reales en vez de descubrirlos arananado. Medido en local: 29 URLs.
      #   · autenticado, inyectando el Authorization en cada peticion con el replacer
      #     de ZAP, de modo que el escaneo activo llega detras del login.
      #   · sin `-I`, asi que un WARN nuevo tumba el despliegue. Hoy el estado es
      #     118 reglas PASS y 0 WARN, asi que cualquier aviso es una regresion real.
      #
      # Se usa `docker run` en lugar de la action para ejecutar exactamente el mismo
      # comando que se valido en local contra el stack.
      - name: Obtain JWT for the authenticated scan
        run: |
          TOKEN=$(curl -sf \
            "http://localhost:8180/realms/inventory/protocol/openid-connect/token" \
            -d "client_id=inventory-frontend" \
            -d "username=inv_admin" \
            -d "password=${{ secrets.STAGING_KC_USER_ADMIN_PASSWORD }}" \
            -d "grant_type=password" \
            -d "scope=openid product:view product:manage stock:view stock:manage report:view audit:view user:manage" \
            | jq -r '.access_token')
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "ERROR: sin JWT no hay escaneo autenticado; se prefiere fallar a escanear a ciegas"
            exit 1
          fi
          # Sin la mascara, el token acabaria en el log del step siguiente.
          echo "::add-mask::$TOKEN"
          echo "ZAP_TOKEN=$TOKEN" >> "$GITHUB_ENV"

          # El realm emite tokens de 300 s (accessTokenLifespan) y el escaneo activo
          # puede durar mas. Si caduca a mitad, ZAP sigue escaneando pero recibiendo
          # 401 en todo, no encuentra nada y el paso termina verde: un escaneo que no
          # prueba nada y aprueba. Se guarda el exp para comprobarlo al terminar.
          EXP=$(echo "$TOKEN" | cut -d. -f2 | tr '_-' '/+' \
                | base64 -d 2>/dev/null | jq -r '.exp')
          echo "ZAP_TOKEN_EXP=$EXP" >> "$GITHUB_ENV"
          echo "Token valido hasta $(date -u -d "@$EXP" '+%H:%M:%S') UTC"

      - name: OWASP ZAP authenticated API scan
        run: |
          mkdir -p "$GITHUB_WORKSPACE/zap-out" && chmod 777 "$GITHUB_WORKSPACE/zap-out"

          # El replacer de ZAP anade la cabecera Authorization a toda peticion del
          # escaneo. Se arma en una variable en lugar de partir la cadena con
          # contrabarras: ahi cualquier espacio de indentacion acaba dentro del valor.
          REPLACER="replacer.full_list(0)"
          ZAP_OPTS="-config $REPLACER.description=auth"
          ZAP_OPTS="$ZAP_OPTS -config $REPLACER.enabled=true"
          ZAP_OPTS="$ZAP_OPTS -config $REPLACER.matchtype=REQ_HEADER"
          ZAP_OPTS="$ZAP_OPTS -config $REPLACER.matchstr=Authorization"
          ZAP_OPTS="$ZAP_OPTS -config $REPLACER.regex=false"
          ZAP_OPTS="$ZAP_OPTS -config $REPLACER.replacement=Bearer $ZAP_TOKEN"

          docker run --rm --network host \
            -v "$GITHUB_WORKSPACE/zap-out:/zap/wrk/:rw" \
            zaproxy/zap-stable zap-api-scan.py \
              -t http://localhost:8080/v3/api-docs \
              -f openapi \
              -r zap-report.html \
              -J zap-report.json \
              -z "$ZAP_OPTS"

      # Un escaneo "autenticado" cuyo token caduco a mitad recorre el resto de la API
      # recibiendo 401. No encuentra nada, y por eso mismo aprueba. Este paso obliga a
      # que esa degradacion se vea: si el escaneo sobrevivio al token, el resultado no
      # es fiable y se falla en vez de dar por bueno un verde vacio.
      - name: Verificar que el escaneo no sobrevivio al token
        if: always()
        run: |
          # Corre con always(), asi que puede llegar aqui sin token si el paso previo
          # fallo. En ese caso no hay nada que comprobar y el fallo ya se reporto alli.
          if [ -z "${ZAP_TOKEN_EXP:-}" ]; then
            echo "Sin token que comprobar: el escaneo no llego a ejecutarse."
            exit 0
          fi
          AHORA=$(date +%s)
          if [ "$AHORA" -gt "$ZAP_TOKEN_EXP" ]; then
            echo "El token caduco $((AHORA - ZAP_TOKEN_EXP))s antes de terminar el escaneo."
            echo "Parte de la API se recorrio sin autenticar, asi que el resultado no vale."
            echo "Opciones: cliente de Keycloak dedicado con accessTokenLifespan mayor,"
            echo "o acortar el alcance del escaneo."
            exit 1
          fi
          echo "OK: el escaneo termino $((ZAP_TOKEN_EXP - AHORA))s antes de que caducara el token"

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-api-scan-report
          path: zap-out/
          retention-days: 30

      # ── Artifacts ────────────────────────────────────────────────────────
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-test-reports
          path: |
            backend/target/surefire-reports/
            report_html.html
          retention-days: 14

      # ── Teardown ──────────────────────────────────────────────────────────
      - name: Teardown stack
        if: always()
        run: docker compose down -v
