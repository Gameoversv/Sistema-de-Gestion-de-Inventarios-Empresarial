name: E2E — Playwright

# Etapa E2E del pipeline (C-1 / TEST-7). Los tres specs de Playwright viven en
# e2e/ pero ninguna etapa de CI los ejecutaba. Este workflow despliega el stack
# completo con el perfil demo (CORS local, logs JSON) y corre Playwright contra
# el sistema ya desplegado, como exige el enunciado para E2E.
#
# No se corre en local: Docker Desktop en Windows no levanta el stack de forma
# fiable (C-4). El veredicto lo da este job en ubuntu-latest.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    name: Deploy demo stack → Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      # Contrasenas de test conocidas (no secretos): coinciden con las que usan
      # los specs (inv_admin / Admin123, etc.). Stack efimero, se destruye al final.
      - name: Create .env (perfil demo)
        run: |
          cat > .env << 'ENVEOF'
          DB_HOST=localhost
          DB_PORT=5432
          DB_NAME=inventory_db
          DB_USER=inventory_user
          DB_PASSWORD=e2e_db_pass
          BACKEND_PORT=8080
          SPRING_PROFILES_ACTIVE=demo
          LOG_LEVEL=INFO
          KEYCLOAK_PORT=8180
          KEYCLOAK_ADMIN=admin
          KEYCLOAK_ADMIN_PASSWORD=e2e_kc_admin
          KC_DB_NAME=keycloak_db
          KC_DB_USER=keycloak_user
          KC_DB_PASSWORD=e2e_kcdb_pass
          KC_REALM=inventory
          KC_USER_ADMIN_USERNAME=inv_admin
          KC_USER_ADMIN_PASSWORD=Admin123
          KC_USER_CLERK_USERNAME=inv_clerk
          KC_USER_CLERK_PASSWORD=Clerk123
          KC_USER_AUDITOR_USERNAME=inv_auditor
          KC_USER_AUDITOR_PASSWORD=Auditor123
          KC_USER_VIEWER_USERNAME=inv_viewer
          KC_USER_VIEWER_PASSWORD=Viewer123
          FRONTEND_PORT=3000
          VITE_API_BASE_URL=
          GRAFANA_ADMIN_PASSWORD=e2e_grafana
          PROMETHEUS_PORT=9090
          GRAFANA_PORT=3001
          TEMPO_PORT=3200
          LOKI_PORT=3100
          ALLOY_PORT=12345
          ALERTMANAGER_PORT=9093
          APP_ENV=dev
          ENVEOF

      - name: Deploy stack (docker compose up --build)
        run: docker compose up -d --build

      - name: Wait — Keycloak ready
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8180/health/ready >/dev/null; then
              echo "Keycloak ready"; exit 0
            fi
            sleep 5
          done
          echo "Keycloak no arranco"; docker compose logs keycloak | tail -50; exit 1

      - name: Wait — Backend healthy
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/actuator/health >/dev/null; then
              echo "Backend healthy"; exit 0
            fi
            sleep 5
          done
          echo "Backend no arranco"; docker compose logs backend | tail -80; exit 1

      - name: Wait — Frontend serving
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000 >/dev/null; then
              echo "Frontend serving"; exit 0
            fi
            sleep 5
          done
          echo "Frontend no responde"; docker compose logs frontend | tail -40; exit 1

      - name: Diag — scopes que emite el stack al admin
        run: |
          TOK=$(curl -s http://localhost:8180/realms/inventory/protocol/openid-connect/token \
            -d client_id=inventory-frontend -d grant_type=password \
            -d username=inv_admin -d password=Admin123 \
            -d 'scope=openid product:view product:manage stock:view stock:manage report:view audit:view' \
            | jq -r .access_token)
          P=$(echo "$TOK" | cut -d. -f2)
          case $((${#P} % 4)) in 2) P="$P==";; 3) P="$P=";; esac
          DEC=$(echo "$P" | tr '_-' '/+' | base64 -d 2>/dev/null)
          echo "SCOPE emitido: $(echo "$DEC" | jq -r .scope)"
          echo "ROLES: $(echo "$DEC" | jq -rc .realm_access.roles)"

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install e2e deps
        working-directory: e2e
        run: npm ci

      - name: Install Playwright (chromium)
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run Playwright
        working-directory: e2e
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 7

      - name: Stack logs on failure
        if: failure()
        run: docker compose logs --tail=60

      - name: Teardown
        if: always()
        run: docker compose down -v
