name: CI — Unit Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  unit-tests:
    name: Build & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests
        working-directory: backend
        run: ./mvnw test -B -Dspotless.check.skip=true

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: backend/target/surefire-reports/
          retention-days: 7

  integration-test:
    name: Integration Tests (Testcontainers)
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # `verify` es la unica invocacion que compila los tests, ejecuta failsafe
      # y aplica el umbral de cobertura. Llamar a los goals de failsafe sueltos
      # no compila nada y termina en "No tests to run".
      - name: Run integration tests and coverage gate
        working-directory: backend
        run: ./mvnw verify -B -Dspotless.check.skip=true

      - name: Upload integration test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-reports
          path: |
            backend/target/failsafe-reports/
            backend/target/site/jacoco/
          retention-days: 7
