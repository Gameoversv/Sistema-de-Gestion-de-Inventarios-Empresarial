networks:
  inventory-net:
    driver: bridge

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: inventory-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db:/docker-entrypoint-initdb.d:ro
    networks:
      - inventory-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: inventory-redis
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
      - --appendonly
      - yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - inventory-net
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Keycloak Database ───────────────────────────────────────────────────────
  keycloak-db:
    image: postgres:16-alpine
    container_name: inventory-keycloak-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${KC_DB_NAME:-keycloak_db}
      POSTGRES_USER: ${KC_DB_USER:-keycloak_user}
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD}
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    networks:
      - inventory-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KC_DB_USER:-keycloak_user} -d ${KC_DB_NAME:-keycloak_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Keycloak ─────────────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: inventory-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/${KC_DB_NAME:-keycloak_db}
      KC_DB_USERNAME: ${KC_DB_USER:-keycloak_user}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      # Expone /metrics para que Prometheus vigile logins, errores y sesiones
      KC_METRICS_ENABLED: "true"
    ports:
      - "${KEYCLOAK_PORT:-8180}:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    networks:
      - inventory-net
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && printf 'GET /health/ready HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && timeout 5 cat <&3 | grep -q UP"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s

  # ── Keycloak Init (one-shot: creates scopes + test users) ──────────────────
  keycloak-init:
    image: alpine:3.19
    container_name: inventory-keycloak-init
    restart: "no"
    env_file:
      - .env
    environment:
      KC_URL: http://keycloak:8080
      KC_REALM: ${KC_REALM:-inventory}
    volumes:
      - ./scripts/keycloak/init-users.sh:/init-users.sh:ro
    entrypoint: ["sh", "/init-users.sh"]
    networks:
      - inventory-net
    depends_on:
      keycloak:
        condition: service_healthy

  # ── Spring Boot Backend ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inventory-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      BACKEND_PORT: 8080
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # issuer-uri: external URL that Keycloak embeds in "iss" claim
      KC_ISSUER_URI: http://localhost:${KEYCLOAK_PORT:-8180}/realms/${KC_REALM:-inventory}
      # jwk-set-uri: internal Docker URL to fetch signing keys without leaving the network
      KC_JWK_SET_URI: http://keycloak:8080/realms/${KC_REALM:-inventory}/protocol/openid-connect/certs
      KC_REALM: ${KC_REALM:-inventory}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    networks:
      - inventory-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Frontend (React) ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: inventory-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    networks:
      - inventory-net
    depends_on:
      backend:
        condition: service_healthy

  # ── Node Exporter (métricas del host: CPU, memoria, disco, red) ─────────────
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: inventory-node-exporter
    restart: unless-stopped
    # Se montan /proc y /sys en lugar de la raíz con rslave: la propagación
    # de montajes compartidos no está disponible en Docker Desktop.
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      # Sin rootfs solo se ven los tmpfs del contenedor y no hay métricas de disco
      # reales: el panel de espacio libre del dashboard de Infraestructura queda
      # vacío. Con /host/root montado se ve el sistema de archivos que de verdad
      # importa, el que aloja los volúmenes de Docker.
      - '--path.rootfs=/host/root'
      - '--collector.filesystem.mount-points-exclude=^/host/root/(sys|proc|dev|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro
    networks:
      - inventory-net

  # ── Postgres Exporter (conexiones, transacciones, tamaño, locks) ────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: inventory-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?sslmode=disable"
    networks:
      - inventory-net
    depends_on:
      postgres:
        condition: service_healthy

  # ── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: inventory-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      # Tempo escribe aquí las métricas RED derivadas de las trazas.
      - '--web.enable-remote-write-receiver'
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    networks:
      - inventory-net
    depends_on:
      - backend

  # ── Tempo (almacenamiento y consulta de trazas distribuidas) ────────────────
  tempo:
    image: grafana/tempo:2.6.1
    container_name: inventory-tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/tempo.yml"]
    ports:
      - "${TEMPO_PORT:-3200}:3200"
    volumes:
      - ./observability/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/var/tempo
    networks:
      - inventory-net

  # ── Loki (almacenamiento y consulta de logs) ────────────────────────────────
  loki:
    image: grafana/loki:3.3.2
    container_name: inventory-loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/loki.yml"]
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ./observability/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    networks:
      - inventory-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3100/ready | grep -q ready"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Alloy (collector: recibe OTLP del backend y lo reparte) ─────────────────
  alloy:
    image: grafana/alloy:v1.5.1
    container_name: inventory-alloy
    restart: unless-stopped
    # El socket de Docker pertenece a root:root con permisos 660. Alloy corre
    # como uid 473 y sin esto no puede leer los logs de los contenedores.
    user: root
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    ports:
      - "${ALLOY_PORT:-12345}:12345"
    volumes:
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - alloy_data:/var/lib/alloy/data
      # Solo lectura: Alloy descubre contenedores y consume sus logs, nunca los
      # controla.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - inventory-net
    depends_on:
      - tempo
      - loki

  # ── Alertmanager (enrutado y agrupación de las 5 alertas) ───────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: inventory-alertmanager
    restart: unless-stopped
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    volumes:
      - ./observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    networks:
      - inventory-net

  # ── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: inventory-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - inventory-net
    depends_on:
      - prometheus

volumes:
  postgres_data:
    driver: local
  keycloak_db_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  alertmanager_data:
    driver: local
  tempo_data:
    driver: local
  loki_data:
    driver: local
  alloy_data:
    driver: local
  grafana_data:
    driver: local
